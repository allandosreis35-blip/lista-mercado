<style>
:root {
  --bg:          #f7f7f5;
  --surface:     #ffffff;
  --surface2:    #f0efeb;
  --border:      rgba(0,0,0,0.08);
  --border2:     rgba(0,0,0,0.14);
  --green:       #1D9E75;
  --green-light: #E1F5EE;
  --green-dim:   #9FE1CB;
  --amber:       #BA7517;
  --amber-light: #FAEEDA;
  --text:        #1a1a18;
  --text2:       #5f5e5a;
  --text3:       #888780;
  --danger:      #E24B4A;
  --radius-sm:   8px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

.page { display: none; flex-direction: column; flex: 1; overflow: hidden; height: 100%; }
.page.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2rem; }
.scroll-area::-webkit-scrollbar { display: none; }

/* SYNC BAR */
.sync-bar { display: flex; align-items: center; gap: 6px; padding: 6px 20px; background: var(--surface2); border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--text3); flex-shrink: 0; min-height: 28px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-dot.ok   { background: var(--green); }
.sync-dot.err  { background: var(--danger); }
.sync-dot.spin { animation: pulse 1s infinite; background: var(--amber); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* HEADER */
.app-header { padding: calc(var(--safe-top) + 18px) 20px 14px; background: var(--bg); border-bottom: 0.5px solid var(--border2); flex-shrink: 0; }
.app-header h1 { font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
.app-header p  { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* SUMMARY */
.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 20px 0; }
.stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }

/* PROGRESS */
.prog-wrap { padding: 14px 20px 0; }
.prog-info { display: flex; justify-content: space-between; margin-bottom: 7px; }
.prog-info span { font-size: 12px; color: var(--text2); }
.prog-bg   { height: 5px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.prog-fill { height: 5px; background: var(--green); border-radius: 5px; transition: width .4s cubic-bezier(.4,0,.2,1); }

/* CTA */
.cta-btn { margin: 14px 20px 0; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; cursor: pointer; background: var(--green-light); border: 0.5px solid var(--green-dim); border-radius: var(--radius-sm); color: var(--green); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; }
.cta-btn:active { opacity: .7; }

/* SECTION LABEL */
.section-lbl { display: flex; align-items: center; gap: 8px; padding: 18px 20px 8px; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
.section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ITEM ROW */
.items-group { padding: 0 20px; }
.item-row { display: flex; align-items: center; gap: 9px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.item-row:last-child { border-bottom: none; }

.check-circle { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
.check-circle.on { background: var(--green); border-color: var(--green); }
.check-circle svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 2.5; fill: none; opacity: 0; transition: opacity .15s; }
.check-circle.on svg { opacity: 1; }

.item-body { flex: 1; min-width: 0; }
.item-name-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.item-name { font-size: 14px; color: var(--text); }
.item-done-name { font-size: 14px; color: var(--text3); text-decoration: line-through; }

/* INLINE EDIT */
.edit-wrap { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
.edit-input { font-size: 13px; font-family: 'DM Sans', sans-serif; height: 32px; border: 0.5px solid var(--green); border-radius: 6px; padding: 0 8px; background: var(--surface); color: var(--text); outline: none; }
.edit-name  { flex: 1; min-width: 0; }
.edit-price { width: 72px; }
.edit-save  { height: 32px; padding: 0 10px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; }
.edit-save:active { opacity: .8; }

/* BADGE */
.badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
.badge-e { background: var(--amber-light); color: var(--amber); border: 0.5px solid rgba(186,117,23,.2); }

.item-price { font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; flex-shrink: 0; min-width: 52px; text-align: right; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; opacity: .4; display: flex; align-items: center; }
.icon-btn:active { opacity: 1; }
.icon-btn svg { width: 16px; height: 16px; stroke: var(--text2); fill: none; stroke-width: 1.8; display: block; }
.icon-btn.d:active svg { stroke: var(--danger); }
.icon-btn.edit-active { opacity: 1; }
.icon-btn.edit-active svg { stroke: var(--green); }

/* DONE DIVIDER */
.done-divider { display: flex; align-items: center; gap: 10px; padding: 16px 20px 8px; }
.done-divider span { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
.done-divider-line { flex: 1; height: 0.5px; background: var(--border2); }

/* EMPTY */
.empty { padding: 44px 20px; text-align: center; color: var(--text3); }
.empty svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.4; margin: 0 auto 12px; display: block; }
.empty p { font-size: 14px; line-height: 1.6; }

/* LOADING */
.loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 99; }
.loading svg { width: 36px; height: 36px; stroke: var(--green); fill: none; stroke-width: 1.6; animation: spin 1s linear infinite; }
.loading p { font-size: 14px; color: var(--text2); }
@keyframes spin { to { transform: rotate(360deg); } }

/* BACKLOG CONTROLS */
.filter-row { display: flex; align-items: center; gap: 8px; padding: 12px 20px 0; }
.filter-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
.filter-select { flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; height: 34px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 0 10px; background: var(--surface); color: var(--text); outline: none; }

.add-row { display: flex; gap: 6px; padding: 12px 20px 0; align-items: center; }
.add-input { font-size: 13px; font-family: 'DM Sans', sans-serif; height: 38px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 0 10px; background: var(--surface); color: var(--text); outline: none; }
.add-input::placeholder { color: var(--text3); }
.add-input:focus { border-color: var(--green); }
.inp-n { flex: 2; } .inp-p { width: 68px; }
.add-btn { width: 38px; height: 38px; flex-shrink: 0; background: var(--green); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 22px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.add-btn:active { opacity: .8; }

/* BACKLOG ROW */
.bl-row { display: flex; align-items: center; gap: 8px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.bl-row:last-child { border-bottom: none; }
.bl-row.in .bl-add { background: var(--green-light); border-color: var(--green-dim); }
.bl-row.in .bl-add svg { stroke: var(--green); }
.bl-add { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bl-add svg { width: 13px; height: 13px; stroke: var(--text3); fill: none; stroke-width: 2; }
.star-btn { background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }

/* CATEGORIES PAGE */
.cat-section { padding: 20px 20px 0; }
.cat-add-row { display: flex; gap: 8px; margin-bottom: 20px; }
.cat-add-row input { flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; height: 38px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 0 10px; background: var(--surface); color: var(--text); outline: none; }
.cat-add-row input:focus { border-color: var(--green); }
.cat-add-row input::placeholder { color: var(--text3); }
.cat-add-btn { height: 38px; padding: 0 16px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; }
.cat-add-btn:active { opacity: .8; }

.cat-list { display: flex; flex-direction: column; gap: 10px; }
.cat-card { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; }
.cat-swatch { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.cat-swatch:hover { border-color: var(--border2); }
.cat-card-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
.cat-card-count { font-size: 12px; color: var(--text3); margin-right: 4px; }
.cat-del-btn { background: none; border: none; cursor: pointer; padding: 4px; opacity: .4; display: flex; }
.cat-del-btn:active { opacity: 1; }
.cat-del-btn svg { width: 16px; height: 16px; stroke: var(--danger); fill: none; stroke-width: 1.8; }

/* COLOR PICKER POPOVER */
.color-picker { display: none; position: fixed; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.12); z-index: 50; flex-wrap: wrap; gap: 8px; width: 188px; }
.color-picker.open { display: flex; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.color-swatch:hover, .color-swatch.sel { border-color: var(--text2); }

/* TAB BAR */
.tab-bar { display: flex; justify-content: space-around; padding: 10px 0 calc(var(--safe-bottom) + 10px); background: var(--bg); border-top: 0.5px solid var(--border2); flex-shrink: 0; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 0 6px; min-width: 46px; }
.tab svg { width: 22px; height: 22px; stroke: var(--text3); fill: none; stroke-width: 1.6; }
.tab span { font-size: 10px; color: var(--text3); }
.tab.on svg { stroke: var(--green); }
.tab.on span { color: var(--green); }
</style>
</head>

      <input id="bl-search" type="text" placeholder="Buscar item…" oninput="window.renderBacklog()"

    </div>
    <div id="backlog-content"></div>
  </div>
  <div class="tab-bar" id="tabs-backlog"></div>
</div>

</div>

  {id:29,name:'Desodorante',        price:25,  cat:'higiene', ess:false, freq:'Ocasional', t:0},
  {id:30,name:'Shampoo',            price:25,  cat:'higiene', ess:false, freq:'Ocasional', t:0},
  {id:31,name:'Fio dental',         price:15,  cat:'higiene', ess:false, freq:'Ocasional', t:0},
  {id:32,name:'Creme de pele',      price:25,  cat:'higiene', ess:false, freq:'Ocasional', t:0},
  {id:33,name:'Cotonete',           price:6,   cat:'higiene', ess:false, freq:'Ocasional', t:0},
];

/* ── STATE ── */
let cats = [];   // [{id, label, color}]
let bl   = [];
let al   = [];
let nid  = 34;
let editingId = null, editingBlId = null;
let saving = false;
let colorPickerTarget = null; // cat id being recolored

/* ── HELPERS ── */
const fmt     = v => 'R$' + v.toFixed(2).replace('.', ',');
const inList  = bid => al.some(i => i.bid === bid);
const catById = id => cats.find(c => c.id === id) || { label: id, color: '#888' };

/* ── SYNC STATUS ── */
function setSyncStatus(status, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  if (!dot || !txt) return;
  dot.className = 'sync-dot ' + (status==='ok'?'ok':status==='err'?'err':'spin');
  txt.textContent = msg;
}

/* ── SAVE ── */
async function save(what = 'all') {
  if (saving) return;
  saving = true;
  setSyncStatus('spin', 'Salvando…');
  try {
    const ops = [];
    if (what === 'all' || what === 'bl')   ops.push(setDoc(blRef,  { items: bl }));
    if (what === 'all' || what === 'al')   ops.push(setDoc(alRef,  { items: al }));
    if (what === 'all' || what === 'cats') ops.push(setDoc(catRef, { items: cats }));
    await Promise.all(ops);
    setSyncStatus('ok', 'Salvo na nuvem');
  } catch(e) {
    setSyncStatus('err', 'Erro ao salvar');
    console.error(e);
  }
  saving = false;
}

/* ── INIT ── */
async function init() {
  try {
    const [blSnap, alSnap, catSnap] = await Promise.all([getDoc(blRef), getDoc(alRef), getDoc(catRef)]);
    cats = catSnap.exists() ? catSnap.data().items : JSON.parse(JSON.stringify(DEFAULT_CATS));
    bl   = blSnap.exists()  ? blSnap.data().items  : JSON.parse(JSON.stringify(SEED_BL));
    al   = alSnap.exists()  ? alSnap.data().items  : [];
    nid  = Math.max(...bl.map(x=>x.id), 33) + 1;
    if (!catSnap.exists()) await setDoc(catRef, { items: cats });
    if (!blSnap.exists())  await setDoc(blRef,  { items: bl });
    setSyncStatus('ok', 'Sincronizado');
  } catch(e) {
    cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
    bl   = JSON.parse(JSON.stringify(SEED_BL));
    al   = [];
    setSyncStatus('err', 'Sem conexão — dados locais');
    console.error(e);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('page-lista').classList.add('active');
  refreshCatSelect();
  renderAll();

  onSnapshot(catRef, snap => { if(snap.exists()){ cats=snap.data().items; refreshCatSelect(); renderAll(); } });
  onSnapshot(blRef,  snap => { if(snap.exists()){ bl=snap.data().items; nid=Math.max(...bl.map(x=>x.id),33)+1; renderBacklog(); } });
  onSnapshot(alRef,  snap => { if(snap.exists()){ al=snap.data().items; renderLista(); } });
}

/* ── CATEGORY SELECT ── */
function refreshCatSelect() {
  const sel = document.getElementById('inp-cat');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = cats.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  if (cats.find(c=>c.id===cur)) sel.value = cur;
}

/* ── SVG ICONS ── */
const ck  = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
const pl  = `<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`;
const xi  = `<svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
const tr  = `<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`;
const li  = `<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
const ar  = `<svg viewBox="0 0 24 24"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>`;
const ok_ = `<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
const ct  = `<svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`;
const pe  = `<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const tg  = `<svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`;

const starSVG   = on => `<svg viewBox="0 0 24 24" style="width:17px;height:17px;display:block;stroke:${on?'#BA7517':'#888780'};fill:${on?'#BA7517':'none'};stroke-width:1.8;opacity:${on?1:.3}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
const starBadge = `<svg style="width:9px;height:9px;fill:#BA7517;stroke:none" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
const essBadge  = `<span class="badge badge-e">${starBadge} essencial</span>`;

/* ── TABS ── */
function tabs(active) {
  return [
    {id:'lista',   ic:li,  lb:'Lista'},
    {id:'backlog', ic:ar,  lb:'Backlog'},
    {id:'cats',    ic:tg,  lb:'Categ.'},
    {id:'clear',   ic:ok_, lb:'Limpar'},
    {id:'zerar',   ic:tr,  lb:'Zerar'},
  ].map(t=>`<div class="tab${t.id===active?' on':''}" onclick="${t.id==='clear'?'clearDone()':t.id==='zerar'?'clearList()':`goPage('${t.id}')`}">${t.ic}<span>${t.lb}</span></div>`).join('');
}

function sHdr(color, label, count) {
  return `<div class="section-lbl"><div class="section-dot" style="background:${color}"></div>${label}<span style="color:var(--text3);margin-left:auto;font-weight:400">${count}</span></div>`;
}

/* ── ACTIVE ROW ── */
function activeRow(item) {
  const editing = editingId === item.id;
  const cat = catById(item.cat);
  const nameEl = item.done ? `<span class="item-done-name">${item.name}</span>` : `<span class="item-name">${item.name}</span>`;
  const editBlock = editing ? `
    <div class="edit-wrap">
      <input class="edit-input edit-name"  id="ei-name-${item.id}"  type="text"   value="${item.name}" maxlength="30"/>
      <input class="edit-input edit-price" id="ei-price-${item.id}" type="number" value="${item.price}" min="0" step="0.01"/>
      <button class="edit-save" onclick="saveEdit(${item.id})">Salvar</button>
    </div>` : '';
  return `<div class="item-row">
    <button class="check-circle${item.done?' on':''}" onclick="toggleItem(${item.id})">${ck}</button>
    <div class="item-body">
      <div class="item-name-wrap">${nameEl}${item.ess?essBadge:''}</div>
      ${editBlock}
    </div>
    ${!editing?`<span class="item-price">${fmt(item.price)}</span>`:''}
    <button class="icon-btn${editing?' edit-active':''}" onclick="toggleEdit(${item.id})">${pe}</button>
    <button class="icon-btn" onclick="togEssAl(${item.id})">${starSVG(item.ess)}</button>
    <button class="icon-btn d" onclick="removeFromList(${item.id})">${xi}</button>
  </div>`;
}

/* ── RENDER LISTA ── */
function renderLista() {
  const total   = al.reduce((s,i)=>s+i.price,0);
  const doneTot = al.filter(i=>i.done).reduce((s,i)=>s+i.price,0);
  const doneN   = al.filter(i=>i.done).length;
  const pct     = al.length ? Math.round(doneN/al.length*100) : 0;
  document.getElementById('total').textContent      = fmt(total);
  document.getElementById('done-val').textContent   = fmt(doneTot);
  document.getElementById('prog').style.width       = pct+'%';
  document.getElementById('prog-label').textContent = pct+'% concluído';
  document.getElementById('prog-items').textContent = doneN+'/'+al.length+' itens';
  document.getElementById('sub-lista').textContent  = al.length+' ite'+(al.length===1?'m':'ns')+' na lista';
  document.getElementById('tabs-lista').innerHTML   = tabs('lista');

  const c = document.getElementById('lista-content');
  if (!al.length) { c.innerHTML=`<div class="empty">${ct}<p>Vá ao backlog e escolha<br>os itens desta semana</p></div>`; return; }

  const pending = al.filter(i=>!i.done);
  const done    = al.filter(i=>i.done);
  let html = '';
  cats.forEach(cat => {
    const its = pending.filter(i=>i.cat===cat.id); if (!its.length) return;
    const catTotal = its.reduce((s,i)=>s+i.price,0);
    html += `<div>${sHdr(cat.color,cat.label,fmt(catTotal))}<div class="items-group">${its.map(activeRow).join('')}</div></div>`;
  });
  if (done.length) {
    const doneTotal = done.reduce((s,i)=>s+i.price,0);
    html += `<div class="done-divider"><div class="done-divider-line"></div><span>Já comprado · ${fmt(doneTotal)}</span><div class="done-divider-line"></div></div>
    <div class="items-group">${done.map(activeRow).join('')}</div>`;
  }
  c.innerHTML = html;
}

/* ── BACKLOG ROW ── */
function blRow(item) {
  const inn = inList(item.id), editing = editingBlId === item.id;
  const editBlock = editing ? `
    <div class="edit-wrap" style="margin-top:6px">
      <input class="edit-input edit-name"  id="bl-ei-name-${item.id}"  type="text"   value="${item.name}" maxlength="30"/>
      <input class="edit-input edit-price" id="bl-ei-price-${item.id}" type="number" value="${item.price}" min="0" step="0.01"/>
      <button class="edit-save" onclick="saveBlEdit(${item.id})">Salvar</button>
    </div>` : '';
  return `<div class="bl-row${inn?' in':''}">
    <button class="bl-add" onclick="togBl(${item.id})">${inn?ck:pl}</button>
    <div class="item-body">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="item-name">${item.name}</span>${item.ess?essBadge:''}
      </div>

      ${editBlock}
    </div>
    ${!editing?`<span class="item-price">${fmt(item.price)}</span>`:''}
    <button class="icon-btn${editing?' edit-active':''}" onclick="toggleBlEdit(${item.id})">${pe}</button>
    <button class="star-btn" onclick="togEssBl(${item.id})">${starSVG(item.ess)}</button>
    <button class="icon-btn d" onclick="delBl(${item.id})">${tr}</button>
  </div>`;
}

/* ── RENDER BACKLOG ── */
function renderBacklog() {
  const inN = bl.filter(b=>inList(b.id)).length;
  document.getElementById('sub-backlog').textContent = inN+' na lista · '+bl.length+' itens';
  document.getElementById('tabs-backlog').innerHTML  = tabs('backlog');

  const sorted = filteredBl(), v = document.getElementById('sort-sel').value;
  const c = document.getElementById('backlog-content');

  if (v==='cat') {
    c.innerHTML = cats.map(cat=>{ const its=sorted.filter(i=>i.cat===cat.id); if(!its.length) return''; return `<div>${sHdr(cat.color,cat.label,its.length)}<div class="items-group">${its.map(blRow).join('')}</div></div>`; }).join('');
  } else if (v==='freq') {
    c.innerHTML = ['Sempre','Frequente','Ocasional'].map(k=>{ const its=sorted.filter(i=>i.freq===k); if(!its.length) return''; return `<div>${sHdr(FCOL[k],k,its.length)}<div class="items-group">${its.map(blRow).join('')}</div></div>`; }).join('');
  } else if (v==='essential') {
    const e=sorted.filter(i=>i.ess), r=sorted.filter(i=>!i.ess);
    c.innerHTML=(e.length?`<div>${sHdr('#BA7517','Essenciais',e.length)}<div class="items-group">${e.map(blRow).join('')}</div></div>`:'')+
                (r.length?`<div>${sHdr('var(--text3)','Outros',r.length)}<div class="items-group">${r.map(blRow).join('')}</div></div>`:'');
  } else {
    c.innerHTML = `<div class="items-group">${sorted.map(blRow).join('')}</div>`;
  }
}

function sortedBl() {
  const s=[...bl], v=document.getElementById('sort-sel').value;
  if (v==='essential') return s.sort((a,b)=>(b.ess?1:0)-(a.ess?1:0));
  if (v==='price')     return s.sort((a,b)=>b.price-a.price);
  return s;
}
function filteredBl() {
  const q=(document.getElementById('bl-search')?.value||'').toLowerCase().trim();
  const s=sortedBl();
  return q ? s.filter(i=>i.name.toLowerCase().includes(q)) : s;
}

/* ── RENDER CATEGORIES ── */
function renderCats() {
  document.getElementById('tabs-cats').innerHTML = tabs('cats');
  const c = document.getElementById('cat-list');
  c.innerHTML = cats.map(cat => {
    const itemCount = bl.filter(i=>i.cat===cat.id).length;
    return `<div class="cat-card">
      <div class="cat-swatch" style="background:${cat.color}" onclick="openColorPicker('${cat.id}', event)" title="Mudar cor"></div>
      <span class="cat-card-name">${cat.label}</span>
      <span class="cat-card-count">${itemCount} ite${itemCount===1?'m':'ns'}</span>
      <button class="cat-del-btn" onclick="deleteCategory('${cat.id}')" title="Excluir categoria">${tr.replace('viewBox','style="width:16px;height:16px;stroke:var(--danger);fill:none;stroke-width:1.8" viewBox')}</button>
    </div>`;
  }).join('');
}

function renderAll() { renderLista(); renderBacklog(); renderCats(); }
window.renderBacklog = renderBacklog;

/* ── COLOR PICKER ── */
function openColorPicker(catId, e) {
  colorPickerTarget = catId;
  const picker = document.getElementById('color-picker');
  const cur = catById(catId).color;
  picker.innerHTML = PALETTE.map(c=>`<div class="color-swatch${c===cur?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  picker.classList.add('open');
  const rect = e.target.getBoundingClientRect();
  picker.style.top  = (rect.bottom + 8) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  e.stopPropagation();
}
function pickColor(color) {
  const cat = cats.find(c=>c.id===colorPickerTarget); if (!cat) return;
  cat.color = color;
  document.getElementById('color-picker').classList.remove('open');
  colorPickerTarget = null;
  renderAll(); save('cats');
}
document.addEventListener('click', () => {
  document.getElementById('color-picker').classList.remove('open');
  colorPickerTarget = null;
});

/* ── CATEGORY CRUD ── */
window.addCategory = () => {
  const inp = document.getElementById('cat-name-input');
  const name = inp.value.trim(); if (!name) return;
  const id = name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'') + '_' + Date.now();
  const color = PALETTE[cats.length % PALETTE.length];
  cats.push({ id, label: name, color });
  inp.value = '';
  refreshCatSelect();
  renderAll(); save('cats');
};

window.deleteCategory = id => {
  const itemCount = bl.filter(i=>i.cat===id).length;
  if (itemCount > 0) {
    alert(`Não é possível excluir "${catById(id).label}" pois ela possui ${itemCount} item(s) no backlog. Remova os itens primeiro.`);
    return;
  }
  cats = cats.filter(c=>c.id!==id);
  refreshCatSelect();
  renderAll(); save('cats');
};

/* ── INTERACTIONS ── */
window.togBl = bid => {
  if (inList(bid)) { al=al.filter(i=>i.bid!==bid); }
  else {
    const b=bl.find(x=>x.id===bid); if(!b) return;
    b.t++; b.freq=b.t>=8?'Sempre':b.t>=4?'Frequente':'Ocasional';
    al.push({id:Date.now(),bid,name:b.name,price:b.price,cat:b.cat,ess:b.ess,done:false});
  }
  renderAll(); save('all');
};

window.toggleItem = id => {
  const i=al.find(x=>x.id===id); if(i){i.done=!i.done; if(editingId===id)editingId=null;}
  renderAll(); save('al');
};

window.removeFromList = id => { if(editingId===id)editingId=null; al=al.filter(x=>x.id!==id); renderAll(); save('al'); };

window.togEssAl = id => {
  const i=al.find(x=>x.id===id); if(!i) return; i.ess=!i.ess;
  const b=bl.find(x=>x.id===i.bid); if(b) b.ess=i.ess;
  renderAll(); save('all');
};

window.togEssBl = bid => {
  const b=bl.find(x=>x.id===bid); if(!b) return; b.ess=!b.ess;
  const i=al.find(x=>x.bid===bid); if(i) i.ess=b.ess;
  renderAll(); save('all');
};

window.toggleEdit = id => {
  editingId = editingId===id ? null : id; renderAll();
  if (editingId===id) setTimeout(()=>{ document.getElementById('ei-name-'+id)?.focus(); },50);
};
window.saveEdit = id => {
  const item=al.find(x=>x.id===id); if(!item) return;
  const n=document.getElementById('ei-name-'+id), p=document.getElementById('ei-price-'+id);
  const nm=n?n.value.trim():item.name, pr=p?parseFloat(p.value)||item.price:item.price;
  if(nm) item.name=nm; item.price=pr;
  const b=bl.find(x=>x.id===item.bid); if(b){b.name=item.name;b.price=item.price;}
  editingId=null; renderAll(); save('all');
};

window.toggleBlEdit = id => {
  editingBlId = editingBlId===id ? null : id; renderAll();
  if (editingBlId===id) setTimeout(()=>{ document.getElementById('bl-ei-name-'+id)?.focus(); },50);
};
window.saveBlEdit = id => {
  const item=bl.find(x=>x.id===id); if(!item) return;
  const n=document.getElementById('bl-ei-name-'+id), p=document.getElementById('bl-ei-price-'+id);
  const nm=n?n.value.trim():item.name, pr=p?parseFloat(p.value)||item.price:item.price;
  if(nm) item.name=nm; item.price=pr;
  const ali=al.find(x=>x.bid===id); if(ali){ali.name=item.name;ali.price=item.price;}
  editingBlId=null; renderAll(); save('all');
};

window.delBl = bid => {
  if(editingBlId===bid) editingBlId=null;
  if(inList(bid)) al=al.filter(i=>i.bid!==bid);
  bl=bl.filter(x=>x.id!==bid);
  renderAll(); save('all');
};

window.addItem = () => {
  const n=document.getElementById('inp-name'), p=document.getElementById('inp-price'), cat=document.getElementById('inp-cat').value;
  const name=n.value.trim(), price=parseFloat(p.value)||0;
  if(!name) return;
  bl.push({id:nid++,name,price,cat,ess:false,freq:'Ocasional',t:0});
  n.value=''; p.value=''; n.focus();
  renderAll(); save('bl');
};

window.selectAll = () => {
  bl.forEach(b=>{ if(!inList(b.id)){b.t++;b.freq=b.t>=8?'Sempre':b.t>=4?'Frequente':'Ocasional';al.push({id:Date.now()+b.id,bid:b.id,name:b.name,price:b.price,cat:b.cat,ess:b.ess,done:false});} });
  renderAll(); save('all');
};
window.deselectAll = () => { al=[]; editingId=null; renderAll(); save('al'); };
window.clearDone   = () => { al=al.filter(x=>!x.done); renderAll(); save('al'); };
window.clearList   = () => { al=[]; editingId=null; renderAll(); save('al'); };

window.goPage = p => {
  ['lista','backlog','cats'].forEach(id => document.getElementById('page-'+id).classList.toggle('active', id===p));
};

document.getElementById('inp-name').addEventListener('keydown',  e=>{ if(e.key==='Enter') document.getElementById('inp-price').focus(); });
document.getElementById('inp-price').addEventListener('keydown', e=>{ if(e.key==='Enter') window.addItem(); });
document.getElementById('cat-name-input').addEventListener('keydown', e=>{ if(e.key==='Enter') window.addCategory(); });

init();
</script>
</body>
</html>
