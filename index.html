<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Mercado"/>
<meta name="theme-color" content="#f7f7f5"/>
<title>Mercado</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:          #f7f7f5;
  --surface:     #ffffff;
  --surface2:    #f0efeb;
  --border:      rgba(0,0,0,0.08);
  --border2:     rgba(0,0,0,0.14);
  --green:       #1D9E75;
  --green-light: #E1F5EE;
  --green-dim:   #9FE1CB;
  --amber:       #BA7517;
  --amber-light: #FAEEDA;
  --blue:        #185FA5;
  --pink:        #993556;
  --text:        #1a1a18;
  --text2:       #5f5e5a;
  --text3:       #888780;
  --danger:      #E24B4A;
  --radius:      14px;
  --radius-sm:   8px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

.page { display: none; flex-direction: column; flex: 1; overflow: hidden; height: 100%; }
.page.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 1.5rem; }
.scroll-area::-webkit-scrollbar { display: none; }

.app-header { padding: calc(var(--safe-top) + 18px) 20px 14px; background: var(--bg); border-bottom: 0.5px solid var(--border2); flex-shrink: 0; }
.app-header h1 { font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
.app-header p  { font-size: 13px; color: var(--text2); margin-top: 3px; }

.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 20px 0; }
.stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }

.prog-wrap { padding: 14px 20px 0; }
.prog-info { display: flex; justify-content: space-between; margin-bottom: 7px; }
.prog-info span { font-size: 12px; color: var(--text2); }
.prog-bg   { height: 5px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.prog-fill { height: 5px; background: var(--green); border-radius: 5px; transition: width .4s cubic-bezier(.4,0,.2,1); }

.cta-btn { margin: 14px 20px 0; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; cursor: pointer; background: var(--green-light); border: 0.5px solid var(--green-dim); border-radius: var(--radius-sm); color: var(--green); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; }
.cta-btn:active { opacity: .7; }

.section-lbl { display: flex; align-items: center; gap: 8px; padding: 18px 20px 8px; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
.section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.items-group { padding: 0 20px; }
.item-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); transition: opacity .2s; }
.item-row:last-child { border-bottom: none; }
.item-row.done { opacity: .35; }

.check-circle { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
.check-circle.on { background: var(--green); border-color: var(--green); }
.check-circle svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 2.5; fill: none; opacity: 0; transition: opacity .15s; }
.check-circle.on svg { opacity: 1; }

.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-row.done .item-name { text-decoration: line-through; color: var(--text3); }
.item-sub { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
.item-qty { font-size: 12px; color: var(--text3); }

.badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
.badge-e { background: var(--amber-light); color: var(--amber); border: 0.5px solid rgba(186,117,23,.2); }

.item-price { font-size: 13px; color: var(--text2); font-family: 'DM Mono', monospace; flex-shrink: 0; min-width: 54px; text-align: right; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; opacity: .4; }
.icon-btn:active { opacity: 1; }
.icon-btn svg { width: 16px; height: 16px; stroke: var(--text2); fill: none; stroke-width: 1.8; display: block; }
.icon-btn.d:active svg { stroke: var(--danger); }

.empty { padding: 44px 20px; text-align: center; color: var(--text3); }
.empty svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.4; margin: 0 auto 12px; display: block; }
.empty p { font-size: 14px; line-height: 1.6; }

.filter-row { display: flex; align-items: center; gap: 8px; padding: 12px 20px 0; }
.filter-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
.filter-select { flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; height: 34px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 0 10px; background: var(--surface); color: var(--text); outline: none; }

.add-row { display: flex; gap: 6px; padding: 12px 20px 0; align-items: center; }
.add-input { font-size: 13px; font-family: 'DM Sans', sans-serif; height: 38px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 0 10px; background: var(--surface); color: var(--text); outline: none; }
.add-input::placeholder { color: var(--text3); }
.add-input:focus { border-color: var(--green); }
.inp-n { flex: 2; } .inp-p { width: 68px; } .inp-c { width: 90px; }
.add-btn { width: 38px; height: 38px; flex-shrink: 0; background: var(--green); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 22px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.add-btn:active { opacity: .8; }

.bl-row { display: flex; align-items: center; gap: 8px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.bl-row:last-child { border-bottom: none; }
.bl-row.in .bl-add { background: var(--green-light); border-color: var(--green-dim); }
.bl-row.in .bl-add svg { stroke: var(--green); }
.bl-add { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.bl-add svg { width: 13px; height: 13px; stroke: var(--text3); fill: none; stroke-width: 2; }

.freq-row { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.freq-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.freq-txt { font-size: 11px; color: var(--text3); }

.star-btn { background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }

.tab-bar { display: flex; justify-content: space-around; padding: 10px 0 calc(var(--safe-bottom) + 10px); background: var(--bg); border-top: 0.5px solid var(--border2); flex-shrink: 0; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 0 8px; min-width: 52px; }
.tab svg { width: 22px; height: 22px; stroke: var(--text3); fill: none; stroke-width: 1.6; }
.tab span { font-size: 10px; color: var(--text3); }
.tab.on svg { stroke: var(--green); }
.tab.on span { color: var(--green); }
</style>
</head>
<body>

<div class="page active" id="page-lista">
  <div class="app-header">
    <h1>Lista da semana</h1>
    <p id="sub-lista">0 itens selecionados</p>
  </div>
  <div class="scroll-area">
    <div class="summary">
      <div class="stat"><div class="stat-label">Total estimado</div><div class="stat-val" id="total">R$0</div></div>
      <div class="stat"><div class="stat-label">No carrinho</div><div class="stat-val" id="done-val">R$0</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-info"><span id="prog-label">0% concluído</span><span id="prog-items">0/0 itens</span></div>
      <div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    </div>
    <button class="cta-btn" onclick="goPage('backlog')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Adicionar itens do backlog
    </button>
    <div id="lista-content"></div>
  </div>
  <div class="tab-bar" id="tabs-lista"></div>
</div>

<div class="page" id="page-backlog">
  <div class="app-header">
    <h1>Backlog</h1>
    <p id="sub-backlog">Escolha os itens desta semana</p>
  </div>
  <div class="scroll-area">
    <div class="add-row">
      <input class="add-input inp-n" id="inp-name"  type="text"   placeholder="Novo item…" maxlength="30"/>
      <input class="add-input inp-p" id="inp-price" type="number" placeholder="R$" min="0" step="0.01"/>
      <select class="add-input inp-c" id="inp-cat">
        <option value="cozinha">Cozinha</option>
        <option value="faxina">Faxina</option>
        <option value="higiene">Higiene</option>
      </select>
      <button class="add-btn" onclick="addItem()">+</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Ordenar por</span>
      <select class="filter-select" id="sort-sel" onchange="renderAll()">
        <option value="cat">Categoria</option>
        <option value="freq">Frequência</option>
        <option value="essential">Essenciais primeiro</option>
        <option value="price">Maior preço</option>
      </select>
    </div>
    <div id="backlog-content"></div>
  </div>
  <div class="tab-bar" id="tabs-backlog"></div>
</div>

<script>
const CATS = { cozinha:{label:'Cozinha',color:'#1D9E75'}, faxina:{label:'Faxina',color:'#185FA5'}, higiene:{label:'Higiene',color:'#993556'} };
const FCOL  = { Sempre:'#1D9E75', Frequente:'#185FA5', Ocasional:'#BA7517' };

const SEED = [
  {id:1, name:'Feijão',             qty:'1kg',         price:9,   cat:'cozinha', ess:true,  freq:'Sempre',    t:12},
  {id:2, name:'Arroz',              qty:'1kg',         price:12,  cat:'cozinha', ess:true,  freq:'Sempre',    t:12},
  {id:3, name:'Ovos',               qty:'12 uni',      price:20,  cat:'cozinha', ess:true,  freq:'Sempre',    t:11},
  {id:4, name:'Carne',              qty:'1kg',         price:150, cat:'cozinha', ess:true,  freq:'Sempre',    t:10},
  {id:5, name:'Pães',               qty:'Sal/Forma',   price:20,  cat:'cozinha', ess:true,  freq:'Sempre',    t:10},
  {id:6, name:'Café',               qty:'1 pct',       price:50,  cat:'cozinha', ess:true,  freq:'Sempre',    t:10},
  {id:7, name:'Frutas',             qty:'1kg',         price:12,  cat:'cozinha', ess:true,  freq:'Sempre',    t:9},
  {id:8, name:'Salada/Legume',      qty:'1kg',         price:10,  cat:'cozinha', ess:true,  freq:'Sempre',    t:9},
  {id:9, name:'Óleo',               qty:'900ml',       price:9,   cat:'cozinha', ess:false, freq:'Frequente', t:6},
  {id:10,name:'Macarrão',           qty:'1kg',         price:12,  cat:'cozinha', ess:false, freq:'Frequente', t:6},
  {id:11,name:'Queijo',             qty:'1kg',         price:50,  cat:'cozinha', ess:false, freq:'Frequente', t:5},
  {id:12,name:'Presunto/Peito Peru',qty:'1kg',         price:40,  cat:'cozinha', ess:false, freq:'Frequente', t:5},
  {id:13,name:'Temperos',           qty:'unidades',    price:30,  cat:'cozinha', ess:false, freq:'Frequente', t:5},
  {id:14,name:'Suco',               qty:'1L',          price:30,  cat:'cozinha', ess:false, freq:'Frequente', t:4},
  {id:15,name:'Refrigerante',       qty:'1L',          price:40,  cat:'cozinha', ess:false, freq:'Frequente', t:4},
  {id:16,name:'Azeitona',           qty:'1 uni',       price:17,  cat:'cozinha', ess:false, freq:'Ocasional', t:2},
  {id:17,name:'Doces/Sobremesas',   qty:'1kg',         price:20,  cat:'cozinha', ess:false, freq:'Ocasional', t:2},
  {id:18,name:'Heineken',           qty:'12 unidades', price:75,  cat:'cozinha', ess:false, freq:'Ocasional', t:2},
  {id:19,name:'Detergente',         qty:'1 uni',       price:3,   cat:'faxina',  ess:true,  freq:'Sempre',    t:10},
  {id:20,name:'Esponja',            qty:'1 uni',       price:5,   cat:'faxina',  ess:true,  freq:'Sempre',    t:9},
  {id:21,name:'Sacos de lixo',      qty:'1 pct',       price:25,  cat:'faxina',  ess:true,  freq:'Sempre',    t:8},
  {id:22,name:'Sabão em pó',        qty:'1,5kg',       price:30,  cat:'faxina',  ess:false, freq:'Frequente', t:5},
  {id:23,name:'Desinfetante',       qty:'1 uni',       price:8,   cat:'faxina',  ess:false, freq:'Frequente', t:4},
  {id:24,name:'Limpador multiuso',  qty:'1 uni',       price:10,  cat:'faxina',  ess:false, freq:'Frequente', t:4},
  {id:25,name:'Amaciante',          qty:'1 uni',       price:25,  cat:'faxina',  ess:false, freq:'Ocasional', t:3},
  {id:26,name:'Papel higiênico',    qty:'1 pct',       price:20,  cat:'higiene', ess:true,  freq:'Sempre',    t:11},
  {id:27,name:'Sabonete',           qty:'1 uni',       price:6,   cat:'higiene', ess:true,  freq:'Sempre',    t:10},
  {id:28,name:'Pasta de dente',     qty:'1 uni',       price:20,  cat:'higiene', ess:true,  freq:'Sempre',    t:9},
  {id:29,name:'Desodorante',        qty:'1 uni',       price:25,  cat:'higiene', ess:false, freq:'Frequente', t:6},
  {id:30,name:'Shampoo',            qty:'1 uni',       price:25,  cat:'higiene', ess:false, freq:'Frequente', t:5},
  {id:31,name:'Fio dental',         qty:'1 uni',       price:15,  cat:'higiene', ess:false, freq:'Frequente', t:4},
  {id:32,name:'Creme de pele',      qty:'1 uni',       price:25,  cat:'higiene', ess:false, freq:'Ocasional', t:2},
  {id:33,name:'Cotonete',           qty:'1 uni',       price:6,   cat:'higiene', ess:false, freq:'Ocasional', t:2},
];

function loadData() {
  try {
    const b = localStorage.getItem('mkt_bl_v3');
    const a = localStorage.getItem('mkt_al_v3');
    return { bl: b ? JSON.parse(b) : JSON.parse(JSON.stringify(SEED)), al: a ? JSON.parse(a) : [] };
  } catch(e) { return { bl: JSON.parse(JSON.stringify(SEED)), al: [] }; }
}
function save() {
  try { localStorage.setItem('mkt_bl_v3', JSON.stringify(bl)); localStorage.setItem('mkt_al_v3', JSON.stringify(al)); } catch(e) {}
}

let { bl, al } = loadData();
let nid = Math.max(...bl.map(x=>x.id), 33) + 1;

const fmt = v => 'R$' + v.toFixed(2).replace('.', ',');
const inList = bid => al.some(i => i.bid === bid);

/* --- SVG helpers --- */
const ck  = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
const pl  = `<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`;
const xi  = `<svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
const tr  = `<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`;
const li  = `<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
const ar  = `<svg viewBox="0 0 24 24"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>`;
const ok  = `<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
const ct  = `<svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`;
const starSVG = on => `<svg viewBox="0 0 24 24" style="width:17px;height:17px;display:block;stroke:${on?'#BA7517':'#888780'};fill:${on?'#BA7517':'none'};stroke-width:1.8;opacity:${on?1:.3}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
const starBadge = `<svg style="width:9px;height:9px;fill:#BA7517;stroke:none" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
const essentialBadge = `<span class="badge badge-e">${starBadge} essencial</span>`;

function tabs(active) {
  return [
    {id:'lista',   ic:li, lb:'Lista'},
    {id:'backlog', ic:ar, lb:'Backlog'},
    {id:'clear',   ic:ok, lb:'Limpar'},
    {id:'zerar',   ic:tr, lb:'Zerar'},
  ].map(t=>`<div class="tab${t.id===active?' on':''}" onclick="${t.id==='clear'?'clearDone()':t.id==='zerar'?'clearList()':`goPage('${t.id}')`}">${t.ic}<span>${t.lb}</span></div>`).join('');
}

function sectionHdr(color, label, count) {
  return `<div class="section-lbl"><div class="section-dot" style="background:${color}"></div>${label}<span style="color:var(--text3);margin-left:auto;font-weight:400">${count}</span></div>`;
}

function renderLista() {
  const total  = al.reduce((s,i)=>s+i.price,0);
  const doneTot= al.filter(i=>i.done).reduce((s,i)=>s+i.price,0);
  const doneN  = al.filter(i=>i.done).length;
  const pct    = al.length ? Math.round(doneN/al.length*100) : 0;
  document.getElementById('total').textContent      = fmt(total);
  document.getElementById('done-val').textContent   = fmt(doneTot);
  document.getElementById('prog').style.width       = pct+'%';
  document.getElementById('prog-label').textContent = pct+'% concluído';
  document.getElementById('prog-items').textContent = doneN+'/'+al.length+' itens';
  document.getElementById('sub-lista').textContent  = al.length+' ite'+(al.length===1?'m':'ns')+' na lista';
  document.getElementById('tabs-lista').innerHTML   = tabs('lista');

  const c = document.getElementById('lista-content');
  if (!al.length) { c.innerHTML=`<div class="empty">${ct}<p>Vá ao backlog e escolha<br>os itens desta semana</p></div>`; return; }

  c.innerHTML = Object.keys(CATS).map(cat=>{
    const its = al.filter(i=>i.cat===cat); if (!its.length) return '';
    const dn  = its.filter(i=>i.done).length;
    return `<div>${sectionHdr(CATS[cat].color, CATS[cat].label, dn+'/'+its.length)}
    <div class="items-group">${its.map(item=>`
      <div class="item-row${item.done?' done':''}">
        <button class="check-circle${item.done?' on':''}" onclick="toggleItem(${item.id})">${ck}</button>
        <div class="item-body">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="item-name">${item.name}</span>${item.ess?essentialBadge:''}
          </div>
          <div class="item-sub"><span class="item-qty">${item.qty}</span></div>
        </div>
        <span class="item-price">${fmt(item.price)}</span>
        <button class="icon-btn d" onclick="removeFromList(${item.id})">${xi}</button>
      </div>`).join('')}</div></div>`;
  }).join('');
}

function sortedBl() {
  const s=[...bl], v=document.getElementById('sort-sel').value;
  if (v==='freq')      return s.sort((a,b)=>b.t-a.t);
  if (v==='essential') return s.sort((a,b)=>(b.ess?1:0)-(a.ess?1:0)||b.t-a.t);
  if (v==='price')     return s.sort((a,b)=>b.price-a.price);
  return s;
}

function blRow(item) {
  const inn = inList(item.id);
  return `<div class="bl-row${inn?' in':''}">
    <button class="bl-add" onclick="togBl(${item.id})">${inn?ck:pl}</button>
    <div class="item-body">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="item-name">${item.name}</span>${item.ess?essentialBadge:''}
      </div>
      <div class="freq-row">
        <div class="freq-pip" style="background:${FCOL[item.freq]}"></div>
        <span class="freq-txt">${item.freq} · ${item.t}x</span>
        <span class="item-qty" style="margin-left:4px">${item.qty}</span>
      </div>
    </div>
    <span class="item-price">${fmt(item.price)}</span>
    <button class="star-btn" onclick="togEss(${item.id})">${starSVG(item.ess)}</button>
    <button class="icon-btn d" onclick="delBl(${item.id})">${tr}</button>
  </div>`;
}

function renderBacklog() {
  const inN = bl.filter(b=>inList(b.id)).length;
  document.getElementById('sub-backlog').textContent  = inN+' na lista · '+bl.length+' itens';
  document.getElementById('tabs-backlog').innerHTML   = tabs('backlog');
  const sorted = sortedBl(), v = document.getElementById('sort-sel').value, c = document.getElementById('backlog-content');
  if (v==='cat') {
    c.innerHTML = Object.keys(CATS).map(cat=>{ const its=sorted.filter(i=>i.cat===cat); if(!its.length) return''; return `<div>${sectionHdr(CATS[cat].color,CATS[cat].label,its.length)}<div class="items-group">${its.map(blRow).join('')}</div></div>`; }).join('');
  } else if (v==='freq') {
    c.innerHTML = ['Sempre','Frequente','Ocasional'].map(k=>{ const its=sorted.filter(i=>i.freq===k); if(!its.length) return''; return `<div>${sectionHdr(FCOL[k],k,its.length)}<div class="items-group">${its.map(blRow).join('')}</div></div>`; }).join('');
  } else if (v==='essential') {
    const e=sorted.filter(i=>i.ess), r=sorted.filter(i=>!i.ess);
    c.innerHTML=(e.length?`<div>${sectionHdr('#BA7517','Essenciais',e.length)}<div class="items-group">${e.map(blRow).join('')}</div></div>`:'')+
                (r.length?`<div>${sectionHdr('var(--text3)','Outros',r.length)}<div class="items-group">${r.map(blRow).join('')}</div></div>`:'');
  } else {
    c.innerHTML = `<div class="items-group">${sorted.map(blRow).join('')}</div>`;
  }
}

function renderAll() { renderLista(); renderBacklog(); save(); }

function togBl(bid) {
  if (inList(bid)) { al=al.filter(i=>i.bid!==bid); }
  else {
    const b=bl.find(x=>x.id===bid); if(!b) return;
    b.t++; b.freq = b.t>=8?'Sempre':b.t>=4?'Frequente':'Ocasional';
    al.push({ id:Date.now(), bid, name:b.name, qty:b.qty, price:b.price, cat:b.cat, ess:b.ess, done:false });
  }
  renderAll();
}
function toggleItem(id)  { const i=al.find(x=>x.id===id); if(i) i.done=!i.done; renderAll(); }
function removeFromList(id) { al=al.filter(x=>x.id!==id); renderAll(); }
function togEss(bid) {
  const b=bl.find(x=>x.id===bid); if(b) b.ess=!b.ess;
  const li=al.find(x=>x.bid===bid); if(li) li.ess=b.ess;
  renderAll();
}
function delBl(bid) { if(inList(bid)) al=al.filter(i=>i.bid!==bid); bl=bl.filter(x=>x.id!==bid); renderAll(); }
function addItem() {
  const n=document.getElementById('inp-name'), p=document.getElementById('inp-price'), cat=document.getElementById('inp-cat').value;
  const name=n.value.trim(), price=parseFloat(p.value)||0;
  if (!name) return;
  bl.push({id:nid++,name,qty:'',price,cat,ess:false,freq:'Ocasional',t:0});
  n.value=''; p.value=''; n.focus(); renderAll();
}
function clearDone() { al=al.filter(x=>!x.done); renderAll(); }
function clearList() { al=[]; renderAll(); }
function goPage(p) {
  document.getElementById('page-lista').classList.toggle('active',   p==='lista');
  document.getElementById('page-backlog').classList.toggle('active', p==='backlog');
}

document.getElementById('inp-name').addEventListener('keydown',  e=>{ if(e.key==='Enter') document.getElementById('inp-price').focus(); });
document.getElementById('inp-price').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });

renderAll();
</script>
</body>
</html>
